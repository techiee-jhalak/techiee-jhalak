name: 🌿 Refresh Digital Terrarium

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: terrarium-refresh
  cancel-in-progress: true

jobs:
  generate:
    name: Generate terrarium SVG
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TERRARIUM_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install --no-package-lock

      - name: Run terrarium generator
        env:
          GITHUB_TOKEN:    ${{ secrets.TERRARIUM_PAT }}
          GITHUB_USERNAME: ${{ vars.TERRARIUM_USERNAME }}
        run: node generate-terrarium.js

      - name: Commit updated SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terrarium.svg
          if git diff --cached --quiet; then
            echo "ℹ️  terrarium.svg unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore: 🌿 refresh digital terrarium [skip ci]"
          git push
